<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTCam - WebRTC to USB Webcam Bridge</title>
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>WebRTCam</h1>
            <p class="subtitle">WebRTC to USB Webcam Bridge</p>
        </header>
        
        <div class="content">
            <div class="streams">
                <div class="video-container">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="stream-info">
                        <div class="status-indicator connected" id="connectionStatus"></div>
                        <span class="status-text" id="statusText">Disconnected</span>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="startButton" class="primary-button">Start Streaming</button>
                    <button id="stopButton" class="secondary-button" disabled>Stop Streaming</button>
                </div>
                
                <div class="settings">
                    <div class="setting-row">
                        <label for="videoSource">Camera:</label>
                        <select id="videoSource"></select>
                    </div>
                    <div class="setting-row">
                        <label for="audioSource">Microphone:</label>
                        <select id="audioSource"></select>
                    </div>
                    <div class="setting-row">
                        <label for="videoResolution">Resolution:</label>
                        <select id="videoResolution">
                            <option value="1280x720">HD (1280x720)</option>
                            <option value="640x480">SD (640x480)</option>
                            <option value="1920x1080">Full HD (1920x1080)</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label for="videoFrameRate">Frame Rate:</label>
                        <select id="videoFrameRate">
                            <option value="30">30 fps</option>
                            <option value="25">25 fps</option>
                            <option value="15">15 fps</option>
                            <option value="10">10 fps</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="stats-container">
                <h2>Connection Statistics</h2>
                <div id="statsPanel">
                    <div class="stat-row">
                        <span class="stat-label">Status:</span>
                        <span class="stat-value" id="connStatus">Disconnected</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Resolution:</span>
                        <span class="stat-value" id="resolution">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Framerate:</span>
                        <span class="stat-value" id="framerate">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Bitrate:</span>
                        <span class="stat-value" id="bitrate">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Audio:</span>
                        <span class="stat-value" id="audioStatus">-</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Server:</span>
                        <span class="stat-value" id="serverStatus">-</span>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>WebRTCam v1.0 | Running on Raspberry Pi</p>
        </footer>
    </div>
    
    <script src="static/js/webrtc.js"></script>
</body>
</html>
